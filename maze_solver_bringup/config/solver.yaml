maze_perception_node:
  ros__parameters:
    scan_topic: /scan
    filtered_scan_topic: /scan_filtered
    regions_topic: /distance_regions
    front_angle_deg: 20.0
    side_center_deg: 90.0
    side_width_deg: 35.0
    window_filter_size: 5
    max_valid_range: 8.0

maze_logic_node:
  ros__parameters:
    regions_topic: /distance_regions
    cmd_vel_topic: /cmd_vel
    desired_wall_distance: 0.45
    wall_detect_threshold: 0.8
    front_block_threshold: 0.48
    turn_exit_front_threshold: 0.75
    front_clearance_target: 0.95
    base_linear_speed: 0.30
    min_linear_speed: 0.07
    max_linear_speed: 0.42
    search_linear_speed: 0.18
    search_turn_speed: 0.20
    search_bias: 0.22
    turn_linear_speed: 0.05
    turn_angular_speed: 0.85
    max_angular_speed: 1.8
    max_speed_reduction: 0.18
    predictive_gain: 0.40
    angular_kp: 2.5
    angular_ki: 0.0
    angular_kd: 0.22
    angular_integral_limit: 0.6
    linear_kp: 0.85
    linear_ki: 0.0
    linear_kd: 0.06
    linear_integral_limit: 0.4

maze_diagnostics_node:
  ros__parameters:
    regions_topic: /distance_regions
    odom_topic: /odom
    goal_topic: /maze_solver/goal_reached
    status_topic: /maze_solver/status
    collision_threshold: 0.14
    goal_x: 5.4
    goal_y: 1.8
    goal_radius: 0.35
